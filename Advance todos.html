<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    *{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Segoe UI", sans-serif;
}

body{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding-top:80px;

/* relaxing night nature background */
background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee");

background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* INPUT AREA */

#todo{
width:320px;
padding:14px 16px;
border-radius:10px;
border:none;
outline:none;
font-size:16px;

background:rgba(255,255,255,0.9);
box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

/* ADD BUTTON */

#addbtn{
padding:12px 16px;
margin-left:10px;
border:none;
border-radius:10px;

background:#2ecc71;
color:white;
font-size:18px;
cursor:pointer;

box-shadow:0 5px 15px rgba(0,0,0,0.4);
transition:0.3s;
}

#addbtn:hover{
background:#27ae60;
transform:scale(1.05);
}

/* UPDATE BUTTON */

.update{
display:none;
}

#updatebtn{
padding:12px 16px;
margin-left:10px;
border:none;
border-radius:10px;

background:#3498db;
color:white;
cursor:pointer;

box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

/* TODOS AREA */

#main{
margin-top:40px;
width:420px;
}

/* TODO CARD */

.todobox{
width:100%;
min-height:55px;

display:flex;
align-items:center;
justify-content:space-between;

padding:12px 14px;
margin-top:15px;

border-radius:12px;

background:rgba(255,255,255,0.92);
backdrop-filter:blur(6px);

box-shadow:0 10px 25px rgba(0,0,0,0.35);

font-size:16px;
transition:0.3s;
}

.todobox:hover{
transform:translateY(-4px);
}

/* BUTTON BASE STYLE */

.todobox button{
border:none;
padding:6px 10px;
border-radius:6px;
font-size:13px;
cursor:pointer;
margin-left:6px;
transition:0.2s;
}

/* DELETE */

.delete{
background:#e74c3c;
color:white;
}

.delete:hover{
background:#c0392b;
}

/* CHANGE */

.change{
background:#f39c12;
color:white;
}

.change:hover{
background:#d68910;
}

/* DONE */

.done{
background:#2ecc71;
color:white;
}

.done:hover{
background:#27ae60;
}
    </style>
</head>
<body>
    <input type="text" name="todo" id="todo" placeholder="enter todo">
    <button onclick="add()" id="addbtn">+</button>
    <button class="update" id="updatebtn">update</button>
    <div id="main"></div>
    <script>
        let main = document.getElementById("main")
let todos = []
let todoinp = document.getElementById("todo");
let addbtn = document.getElementById("addbtn")
let updatebtn = document.getElementById("updatebtn")
function add() { //Add fucntion 
    if(todoinp.value == "") {
  alert("enter todo")
  return ;
    }
    let todoobj = {//pushing todos in the foam of object
        text:todoinp.value,
        id:Math.random()*9999999999999999,
        IScomplete:false
    }
    todos.push(todoobj)
    console.log(todos)
    let todobox = document.createElement("div") //creating todos box
    todobox.className = "todobox"
    todobox.innerText = todoinp.value;
    main.appendChild(todobox)
//working on deleting button
let deletebutton = document.createElement("button")
deletebutton.innerText = "Delete"
deletebutton.className = "delete"
todobox.appendChild(deletebutton)
deletebutton.onclick = function () {
         todobox.remove()
         for(let i=0; i < todos.length; i++) {
            if(todos[i].id == todoobj.id) {
    todos.splice(i,1)
    break ;
            }
         }
}
//working on change button
let changebutton = document.createElement("button")
changebutton.innerText = "change"
changebutton.className = "change"
todobox.appendChild(changebutton)
changebutton.onclick = function () {
       addbtn.style.display = "none"
       updatebtn.style.display = "inline"
       todoinp.value = todoobj.text
       updatebtn.onclick = function () {
        if (todoinp.value === "") {
alert("enter todo")
return ;
        }
        todobox.innerText = todoinp.value
        todobox.appendChild(deletebutton)
        todobox.appendChild(donebtn)
todobox.appendChild(changebutton)
addbtn.style.display = "inline"
updatebtn.style.display = "none"
todoobj.text = todoinp.value
todoinp.value = ""
}
}
//working on done button
let donebtn = document.createElement("button")
donebtn.innerText = "Done"
donebtn.className = "done"
todobox.appendChild(donebtn)
donebtn.onclick = function () {
    todobox.style.backgroundColor = "lightgreen"
    todoobj.IScomplete = true
    donebtn.style.display = "none"
    let notdonebtn = document.createElement("button")
    notdonebtn.innerText = "Not done"
    todobox.appendChild(notdonebtn)
    notdonebtn.className = "done"
    notdonebtn.onclick = function () {
        todobox.style.backgroundColor = "white"
        todoobj.IScomplete = false
        notdonebtn.style.display = "none"
        donebtn.style.display = "inline"
    }
}
 todoinp.value = ""
}
    </script>
</body>
</html>
