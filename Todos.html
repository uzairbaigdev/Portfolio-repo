<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>todos</title>
    <style>
      body {
    font-family: Arial, Helvetica, sans-serif;
    background-color: gray;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-top: 60px;
}


#todosinp {
    width: 300px;
    padding: 12px 15px;
    border: 1px solid white;
    border-radius: 6px;
    font-size: 15px;
    transition: 0.3s ease;
}

#todosinp:focus {
    border-color: black;
    box-shadow: 0 0 5px rgba(74, 144, 226, 0.4);
}


button {
    padding: 10px 18px;
    margin-left: 10px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    transition: 0.3s ease;
}


#add {
    background-color: rgb(36, 138, 206);
    color: white;
}

#add:hover {
    background-color: green;
}


#Update {
    background-color: green;
    color: white;
}

/* #Update:hover {
    background-color: #1e7e34;
} */

#main {
    width: 400px
}
    </style>
</head>
<body>
    <input type="text" name="todos" id="todosinp" placeholder="enter todo">
    <button onclick="add()" id="add">Add</button>
    <button class="Update" id="Update">Update</button>
    <div id="main"></div>
    <script>
        let todos = []
        let reset = document.createElement("button")
        reset.style.display = "none"
let main = document.getElementById("main")
let update = document.getElementById("Update")
update.style.display = "none"
let addbtn = document.getElementById("add")
addbtn.style.display = "inline"
let date = new Date() //date and also ID
function add() {  // adding todo in the array
    let todosinp = document.getElementById("todosinp");
    let todosstore = todosinp.value;
if(todosstore.trim().length < 1) {
    alert("enter todo")
    return ;
}
  let todosobj = {   // pusing input in the foam of objects
        text: todosstore,
        id:date.getTime()+Math.floor(Math.random()*1000),
        iscompleted: false 
    }
    todos.push(todosobj)
console.log(todos)
let pelm = document.createElement("p")  //working on dom
pelm.innerText = todosstore;
pelm.className = "box"
//working on deleting button
let divelm = document.createElement("div")
divelm.className = "divelm";
let deletingtodos = document.createElement("button")
deletingtodos.innerText = "Delete"
deletingtodos.onclick = function () {
    divelm.remove()
}
divelm.appendChild(pelm)
divelm.appendChild(deletingtodos)
main.appendChild(divelm)
//working on update
let change = document.createElement("button")
//change button
change.onclick = function () {
    update.style.display = "inline"
    addbtn.style.display = "none"
   todosinp.value = todosobj.text
   //update button
   update.onclick = function () {
    pelm.innerText = todosinp.value
    todosobj.text = todosinp.value
    addbtn.style.display = "inline"
    update.style.display = "none"
      todosinp.value = todosobj.text
      todosinp.value = "";
    }
}
change.innerText = "Change"
divelm.appendChild(change)
//working on done buttton
let donebtn = document.createElement("button")
donebtn.innerText = "done"
divelm.appendChild(donebtn)
donebtn.onclick = function () {
    divelm.style.color = "green"
    todosobj.iscompleted = true
    donebtn.style.display = "none"
    //working on reset button
    reset.style.display = "inline"
    reset.innerText = "Reset"
    divelm.appendChild(reset)
    reset.onclick = function () {
           divelm.style.color = "black"
           todosobj.iscompleted = false
           donebtn.style.display = "inline"
           reset.style.display = "none"
    }
}


todosinp.value = "";
}


    </script>
</body>
</html>
