<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>form submission</title>

<style>

*{
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body{
    background-color: rgb(172, 172, 159);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 15px;
}

.main1{
    width: 100%;
    max-width: 420px;
    background-color: white;
    border-radius: 20px;
    padding: 20px;
}

input{
    width: 100%;
    padding: 10px;
    margin-top: 12px;
    border-radius: 10px;
    border: 1px solid gray;
}

.submit{
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    border-radius: 20px;
    border: none;
    color: white;
    background-color: blue;
    cursor: pointer;
}

.child1{
    width: 100%;
    border-top: 1px solid black;
    margin-top: 20px;
    padding-top: 10px;
}

.names{
    display: none;
}

/* Tablet */
@media (max-width: 768px){
    .main1{
        max-width: 350px;
    }
}

/* Mobile */
@media (max-width: 480px){
    .main1{
        max-width: 100%;
        padding: 15px;
    }

    input{
        padding: 8px;
    }

    .submit{
        padding: 9px;
    }
}

</style>
</head>

<body>

<div class="main1">

<input type="text" name="name" id="name" placeholder="enter your name">

<input type="number" name="age" id="age" placeholder="enter your age">

<input type="text" name="course" id="course" placeholder="enter your course">

<button class="submit" onclick="submit()">Submit</button>

<div class="child1">
<span class="names">Name:</span>
<span id="nameplace"></span>
<br>

<span class="names">Age:</span>
<span id="ageplace"></span>
<br>

<span class="names">course:</span>
<span id="courseplace"></span>
</div>

</div>

<script>
    let userData = []
let nameinp = document.getElementById("name")
let ageinp = document.getElementById("age")
let courseinp = document.getElementById("course")
//working on submit button
function submit() {
if(nameinp.value === "" || ageinp.value === "" || courseinp.value === "") {
    alert("fulfill all input")
    return;
}
else if(!isNaN(nameinp.value)) {
    alert("enter name correctly")
    return;
}
else if(!isNaN(courseinp.value)) {
    alert("enter course correctly")
    return;
}
else if(courseinp.value.toLowerCase() === "web and app development" || courseinp.value.toLowerCase() === "python") {
     alert("your foam is successfully submited")
     let userobj = {
        name:nameinp.value,
        age:ageinp.value,
        course:courseinp.value,
        id:Math.floor(Math.random()*999999999999)
     }
     userData.push(userobj)
     console.log(userData)
     //pushing array to local storage
     let stringData = JSON.stringify(userData)
     window.localStorage.setItem("userData",stringData)
     //working on DOM
     let nameplace = document.getElementById("nameplace")
     nameplace.innerText = nameinp.value;
     let ageplace = document.getElementById("ageplace")
     ageplace.innerText = ageinp.value;
     let courseplace = document.getElementById("courseplace");
     courseplace.innerText = courseinp.value;
     let names = document.getElementsByClassName("names")
     for(let i=0; i < names.length; i++) {
        names[i].style.display = "inline"
     }
nameinp.value = "";
ageinp.value = "";
courseinp.value = "";
}
else {
    alert("This course is not available")
}
}
</script>

</body>
</html>
