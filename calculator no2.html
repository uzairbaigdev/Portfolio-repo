<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Calculator</title>
    <style>
        body {
            background-color: rgb(15, 15, 15);
        }

        .parent {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .div1 {
            width: 300px;
            height: 420px;
            background-color: rgb(28, 28, 28);
            border: 2px solid rgb(80, 80, 80);
            border-radius: 14px;
        }

        .child1 {
            width: 100%;
            height: 40px;
            background-color: rgb(10, 10, 10);
            border-top-left-radius: 14px;
            border-top-right-radius: 14px;
            color: aqua;
            display: flex;
            justify-content: right;
            align-items: center;
            font-size: x-large;
        }

        .child2 {
            width: 100%;
            height: 40px;
            background-color: rgb(10, 10, 10);
            border-bottom: 1px solid rgb(70, 70, 70);
             color: aqua;
             display: flex;
             justify-content: right;
             align-items: center;
            font-size: x-large;

        }

        .child3 {
            display: flex;
            justify-content: space-evenly;
            margin-top: 8px;
        }

        .child4 {
            display: flex;
            justify-content: space-evenly;
            margin-top: 6px;
        }

        .child5 {
            display: flex;
            justify-content: space-evenly;
            margin-top: 6px;
        }

        .child6 {
            display: flex;
            justify-content: space-evenly;
            margin-top: 6px;
        }

       .btn1 {
            height: 60px;
            width: 150px;
            font-size: larger;
            background-color: rgb(180, 50, 50);
            color: white;
            border: none;
            border-radius: 8px;
            margin-left: 5px;
        }

       .btn2 {
            height: 60px;
            width: 80px;
            margin-left: 5px;
            font-size: larger;
            background-color: rgb(55, 55, 55);
            color: white;
            border: 1px solid rgb(90, 90, 90);
            border-radius: 8px;
        }

        .btn3 {
            height: 60px;
            width: 80px;
            margin-left: 5px;
            font-size: larger;
            background-color: rgb(55, 55, 55);
            color: white;
            border: 1px solid rgb(90, 90, 90);
            border-radius: 8px;
        }

      .btn4 {
            height: 60px;
            width: 80px;
            margin-left: 5px;
            font-size: larger;
            background-color: rgb(55, 55, 55);
            color: white;
            border: 1px solid rgb(90, 90, 90);
            border-radius: 8px;
        }

       .last-child1 {
            background-color: rgb(255, 140, 0);
            color: white;
            border: none;
        }

        .last-child2 {
            background-color: rgb(255, 140, 0);
            color: white;
            border: none;
        }

        .last-child3 {
            background-color: rgb(255, 140, 0);
            color: white;
            border: none;
        }
        .child7 {
            display: flex;
            justify-content: space-evenly;
                margin-top: 6px;
        }
    .btn5 {
    height: 60px;
    width: 80px;
    margin-left: 5px;
    font-size: larger;
    background-color: rgb(55, 55, 55);
    color: white;
    border: 1px solid rgb(90, 90, 90);
    border-radius:8px;
}
.last-child4 {
    background-color: rgb(255, 140, 0);
            color: white;
            border: none;
}
    </style>
</head>
<body>

    <div class="parent">
        <div class="div1">

            <div id="child1" class="child1"></div>
            <div id="child2" class="child2"></div>

            <div class="child3">
                <button class="btn1" onclick="remove()">C</button>
                <button class="btn1" onclick="del()">del</button>
                <button class="btn1" onclick="result()">=</button>
            </div>

            <div class="child4">
                <button class="btn2" onclick="btn(1)">1</button>
                <button class="btn2" onclick="btn(2)">2</button>
                <button class="btn2" onclick="btn(3)">3</button>
                <button class="btn2 last-child1" onclick="btn('/')">/</button>
            </div>

            <div class="child5">
                <button class="btn3" onclick="btn(4)">4</button>
                <button class="btn3" onclick="btn(5)">5</button>
                <button class="btn3" onclick="btn(6)">6</button>
                <button class="btn3 last-child2" onclick="btn('+')">+</button>
            </div>

            <div class="child6">
                <button class="btn4" onclick="btn(7)">7</button>
                <button class="btn4" onclick="btn(8)">8</button> 
                <button class="btn4" onclick="btn(9)">9</button>
                <button class="btn4 last-child3" onclick="btn('-')">-</button>
            </div>
            <div class="child7">
                <button class="btn5" onclick="btn('0')">0</button>
                <button class="btn5" onclick="btn('00')">00</button>
                <button class="btn5" onclick="btn('.')">.</button>
                <button class="btn5 last-child4" onclick="btn('*')">*</button>
</div>

        </div>
    </div>
<script>
    function btn(value) {
    var display = document.getElementById("child1");
    display.innerText += value
}
function del() {
      var display = document.getElementById("child1");
      display.innerText = display.innerText.slice(0,display.innerText.length-1)
}
function remove() {
     var display = document.getElementById("child1");
     display.innerText = display.innerText.slice(0,0)
     var display2 = document.getElementById("child2")
     display2.innerText = display2.innerText.slice(0,0)
}
function result() {
      var display = document.getElementById("child1");
      var display2 = document.getElementById("child2");
     if(display.innerText.trim() === "") {
        display2.innerText = " ";
        return ;
     }
    display2.innerText = (eval(display.innerText))
}
</script>
</body>
</html>
