<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo list</title>
  <style>
    body {
      background-color: rgb(236, 235, 235);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    nav {
      width: 100%;
      height: 150px;
      background-color: rgb(1, 1, 39);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 70px;
      font-weight: bolder;
      letter-spacing: 3px;
    }
    .main1 {
      width: 550px;
      height: 150px;
      background-color: white;
      margin-top: 30px;
    }
    #nameinp {
      width: 200px;
      height: max-content;
      font-size: larger;
      margin-top: 30px;
      margin-left: 40px;
    }
    #ageinp {
       width: 200px;
      height: max-content;
      font-size: larger;
      margin-top: 30px;
      margin-left: 40px;
    }
    #cityinp {
       width: 200px;
      height: max-content;
      font-size: larger;
      margin-top: 30px;
      margin-left: 40px;
    }
    #addbtn {
      width: max-content;
      height: max-content;
      color: white;
      background-color: green;
      font-weight: bolder;
      margin-top: 30px;
      margin-left: 40px;
      font-size: larger;
      border-radius: 20px;
    }
    .box {
      width: max-content;
      height: max-content;
      font-size: larger;
      font-weight: bolder;
      background-color: white;
      margin-top: 10px;
      border: 2px solid black;
      padding: 5px;
      margin-right: 5px;
    }
    .deletebtn {
      color: white;
      background-color: red;
      margin-left: 10px;
    }
    .changebtn {
      color: white;
      background-color: brown;
      margin-left: 10px;
    }
    #updatebtn {
      width: max-content;
      height: max-content;
      color: white;
      background-color: green;
      font-weight: bolder;
      margin-top: 30px;
      margin-left: 40px;
      font-size: larger;
      border-radius: 20px;
      display: none;
    }
    .donebtn {
      color: white;
      background-color: gray;
      margin-left: 10px;
    }
    .notdonebtn {
      color: white;
      background-color: gray;
      margin-left: 10px;
    }
    /* 📱 MOBILE */
@media (max-width: 600px) {
  nav {
    font-size: 28px;
    height: 80px;
  }

  .main1 {
    width: 95%;
    height: auto;
    display: flex;
    flex-direction: column;   /* 🔥 vertical layout */
    align-items: center;
  }

  #nameinp,
  #ageinp,
  #cityinp {
    width: 90%;
    margin: 10px 0;          /* remove left margin effect */
  }

  #addbtn,
  #updatebtn {
    width: 90%;
    margin: 10px 0;
  }

  .box {
    width: 95%;
    margin: 10px auto;
    font-size: medium;
  }
}


/* 📱 TABLET */
@media (min-width: 601px) and (max-width: 900px) {
  .main1 {
    width: 80%;
    height: auto;
  }

  #nameinp,
  #ageinp,
  #cityinp {
    width: 80%;
    margin: 10px auto;
    display: block;
  }

  #addbtn,
  #updatebtn {
    display: block;
    margin: 10px auto;
    width: 50%;
  }

  .box {
    width: 80%;
    margin: 10px auto;
  }
}
  </style>
</head>
<body>
  <nav>Todo list</nav>
  <div class="main1">
    <input type="text" name="Name" id="nameinp" placeholder="enter your name">
    <input type="number" name="Age" id="ageinp" placeholder="enter your age">
    <input type="text" name="city" id="cityinp" placeholder="enter your city">
    <button id="addbtn" onclick="add()">Add</button>
    <button id="updatebtn">Update</button>
  </div>
  <div id="main2"></div>
  
  <script>
    let Todos = [];
let main2 = document.getElementById("main2");
let nameinp = document.getElementById("nameinp");
let ageinp = document.getElementById("ageinp");
let cityinp = document.getElementById("cityinp");
let addbtn = document.getElementById("addbtn");
let updatebtn = document.getElementById("updatebtn");
//working on adding
function add() {
   if(nameinp.value === ""||ageinp.value === ""||cityinp.value === "") {
    alert("fullfill all inputs")
    return;
   }
//pushing todos data in the foam of objects 
let todoobj = {
    name:nameinp.value,
    age:ageinp.value,
    city:cityinp.value,
    iscomplete:false,
    ID:Math.floor(Math.random()*999999999999)
}   
Todos.push(todoobj);
console.log(Todos);
//working on DOM
let divelm = document.createElement("div");
main2.appendChild(divelm);
divelm.className = "box";
divelm.innerText = "Name:"+nameinp.value+"  Age:"+ageinp.value+"   city:"+cityinp.value;
//working on deleting 
let deletebtn = document.createElement("button");
deletebtn.innerText = "Delete";
deletebtn.className = "deletebtn"
divelm.appendChild(deletebtn);
deletebtn.onclick = function () {
    if(todoobj.iscomplete === true) {
        alert("first off done then click delete")
        return;
    }
    divelm.remove();
    for(let i=0; i < Todos.length; i++) {
        Todos.splice(i,1)
    }
}
//working on change button
let changebtn = document.createElement("button");
changebtn.innerText = "Change"
changebtn.className ="changebtn"
divelm.appendChild(changebtn);
changebtn.onclick = function () {
    if(todoobj.iscomplete === true) {
        alert("first off done then click change")
        return;
    }
    donebtn.style.display = "none";
    addbtn.style.display = "none";
    updatebtn.style.display = "inline"
    nameinp.value = todoobj.name;
    ageinp.value = todoobj.age;
    cityinp.value = todoobj.city;
//working on update button
updatebtn.onclick = function () {
    todoobj.name = nameinp.value;
    todoobj.age = ageinp.value;
    todoobj.city = cityinp.value;
divelm.innerText = "Name:"+nameinp.value+"  Age:"+ageinp.value+"   city:"+cityinp.value;
divelm.appendChild(deletebtn);
divelm.appendChild(changebtn);
divelm.appendChild(donebtn);
    updatebtn.style.display = "none";
    addbtn.style.display = "inline"
    donebtn.style.display = "inline"
nameinp.value = "";
ageinp.value = "";
cityinp.value = "";
}    
}
//working on done button
let donebtn = document.createElement("button");
donebtn.innerText = "Done";
donebtn.className = "donebtn";
divelm.appendChild(donebtn);
donebtn.onclick = function () {
    divelm.style.backgroundColor = "lightgreen"
    todoobj.iscomplete = true;
    donebtn.style.display = "none";
//working on notdone button    
let notdonebtn = document.createElement("button");
notdonebtn.innerText = "NotDone";
notdonebtn.className = "notdonebtn";
divelm.appendChild(notdonebtn);
notdonebtn.onclick = function () {
    todoobj.iscomplete = false;
    divelm.style.backgroundColor = "white";
    notdonebtn.style.display = "none";
    donebtn.style.display = "inline";
}    
}
nameinp.value = "";
ageinp.value = "";
cityinp.value = "";
}
  </script>
</body>
</html>
