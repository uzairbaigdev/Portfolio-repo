```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Submission</title>

<style>

body{
    background-color: rgb(233,230,230);
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
}

/* NAVBAR */

nav{
    width:100%;
    height:120px;
    background-color: rgb(1,1,43);
    color:white;
    font-size:40px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bolder;
    letter-spacing:5px;
}

/* MAIN FORM BOX */

.main1{
    width:90%;
    max-width:550px;
    background:white;
    margin:40px auto;
    border-radius:20px;
    padding:20px;
    box-sizing:border-box;

    display:flex;
    flex-wrap:wrap;
    justify-content:space-between;
}

/* INPUTS */

.main1 input{
    width:48%;
    padding:10px;
    font-size:16px;
    border-radius:20px;
    margin-top:20px;
}

/* BUTTON */

button{
    margin:25px auto;
    padding:10px 25px;
    font-size:18px;
    border-radius:20px;
    background-color:green;
    color:white;
    border:none;
    cursor:pointer;
}

/* ERROR MESSAGE */

p{
    color:red;
    font-size:18px;
    display:none;
    width:100%;
}

/* RESULT SECTION */

.child1{
    width:100%;
    margin-top:20px;
    border-top:2px solid black;
    padding-top:10px;
}

h2{
    display:inline;
}

/* MOBILE RESPONSIVE */

@media(max-width:600px){

    nav{
        font-size:28px;
        height:90px;
    }

    .main1 input{
        width:100%;
    }

}

</style>

</head>

<body>

<nav>Form Submission</nav>

<div class="main1">

<input type="text" id="nameinp" placeholder="Enter your name">
<input type="number" id="ageinp" placeholder="Enter your age">

<input type="text" id="cityinp" placeholder="Enter your city">
<input type="text" id="courseinp" placeholder="Enter your course">

<button onclick="sub()">Submit</button>

<p id="error">Invalid input</p>

<!-- RESULT -->

<div class="child1">

<h2>Name:</h2>
<span id="nameplace"></span>
<br>

<h2>Age:</h2>
<span id="ageplace"></span>
<br>

<h2>City:</h2>
<span id="cityplace"></span>
<br>

<h2>Course:</h2>
<span id="courseplace"></span>

</div>

</div>

<script>
    let userData = [];
let nameinp = document.getElementById("nameinp");
let ageinp = document.getElementById("ageinp");
let cityinp = document.getElementById("cityinp");
let courseinp = document.getElementById("courseinp");
let showerror = document.getElementById("error");
//working on submission
function sub() {
//working on error    
    if(nameinp.value.length < 3 || ageinp.value === "" || cityinp.value === "" || courseinp.value === "") {
        showerror.style.display = "block"
        return;
    }
    showerror.style.display = "none"
//pushing data to array in the form of objects
let userobj = {
    name:nameinp.value,
    age:ageinp.value,
    city:cityinp.value,
    course:courseinp.value,
    id:Math.floor(Math.random()*999999999999)
}
userData.push(userobj)        
console.log(userData)
//pushing data to local storage
let stringdata = JSON.stringify(userobj);
window.localStorage.setItem("userdata",stringdata)
//working on DOM
let nameplace = document.getElementById("nameplace");
let ageplace = document.getElementById("ageplace");
let cityplace = document.getElementById("cityplace");
let courseplace = document.getElementById("courseplace")
nameplace.innerText = nameinp.value;
ageplace.innerText = ageinp.value;
cityplace.innerText = cityinp.value;
courseplace.innerText = courseinp.value;
//clear
nameinp.value = "";
ageinp.value = "";
cityinp.value = "";
courseinp.value = "";   
}
</script>

</body>
</html>
