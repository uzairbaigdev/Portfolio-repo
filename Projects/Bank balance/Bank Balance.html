<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank Balance</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
    :root {
        --ink: #102A3B;
        --ink-soft: #1C3C50;
        --ledger: #F7F3E8;
        --ledger-line: #E2DBC6;
        --paper: #FFFDF8;
        --slate: #44505A;
        --brass: #9C7A3C;
        --brass-light: #C9A86A;
        --forest: #1F6F4A;
        --forest-dark: #175939;
        --clay: #A8463A;
        --clay-dark: #8C3A30;
        --focus: #3D7BBF;
    }

    * {
        box-sizing: border-box;
    }

    body {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        margin: 0;
        padding: 0;
        background: radial-gradient(circle at 20% 0%, var(--ink-soft) 0%, var(--ink) 55%, #081924 100%);
        font-family: 'IBM Plex Sans', sans-serif;
        color: var(--slate);
    }

    .page {
        width: 100%;
        display: flex;
        justify-content: center;
        padding: 64px 20px;
    }

    .main {
        width: 420px;
        max-width: 100%;
        background-color: var(--ledger);
        border-radius: 6px;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        position: relative;
        padding: 0 0 32px;
        box-shadow:
            0 1px 0 rgba(255, 255, 255, 0.4) inset,
            0 30px 60px -20px rgba(0, 0, 0, 0.55),
            0 0 0 1px rgba(16, 42, 59, 0.08);
        background-image: repeating-linear-gradient(
            to bottom,
            transparent 0px,
            transparent 35px,
            var(--ledger-line) 36px
        );
        background-position: 0 132px;
    }

    /* Passbook stitched edge along the top */
    .main::before {
        content: "";
        display: block;
        height: 10px;
        width: 100%;
        border-radius: 6px 6px 0 0;
        background: linear-gradient(135deg, var(--brass-light), var(--brass));
    }

    .letterhead {
        padding: 28px 32px 22px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid var(--ledger-line);
        background-color: var(--ledger);
    }

    .letterhead .mark {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--ink-soft), var(--ink));
        flex-shrink: 0;
        position: relative;
    }

    .letterhead .mark::after {
        content: "";
        position: absolute;
        inset: 7px;
        border: 1.5px solid var(--brass-light);
        border-radius: 50%;
    }

    .letterhead h1 {
        font-family: 'Fraunces', serif;
        font-weight: 700;
        font-size: 22px;
        letter-spacing: 0.01em;
        color: var(--ink);
        margin: 0;
        line-height: 1.15;
    }

    .letterhead .eyebrow {
        display: block;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 10px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--brass);
        margin-bottom: 4px;
    }

    .ledger-row {
        padding: 26px 32px 24px;
    }

    .ledger-row .eyebrow {
        display: block;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--slate);
        opacity: 0.65;
        margin-bottom: 10px;
    }

    #show {
        font-family: 'IBM Plex Mono', monospace;
        font-weight: 600;
        font-size: 44px;
        color: var(--ink);
        margin: 0;
        letter-spacing: 0.01em;
        line-height: 1;
        word-break: break-all;
    }

    #show::before {
        content: "Rs ";
        font-size: 22px;
        font-weight: 500;
        color: var(--brass);
        vertical-align: middle;
        margin-right: 2px;
    }

    .field {
        padding: 4px 32px 6px;
    }

    .field label {
        display: block;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--slate);
        opacity: 0.7;
        margin-bottom: 8px;
    }

    #balance {
        width: 100%;
        font-family: 'IBM Plex Sans', sans-serif;
        font-size: 17px;
        font-weight: 500;
        color: var(--ink);
        background-color: var(--paper);
        border: 1.5px solid var(--ledger-line);
        border-radius: 8px;
        padding: 13px 14px;
        outline: none;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    #balance::placeholder {
        color: #A8ADA0;
        font-weight: 400;
    }

    #balance:focus-visible {
        border-color: var(--focus);
        box-shadow: 0 0 0 3px rgba(61, 123, 191, 0.18);
    }

    .actions {
        display: flex;
        gap: 10px;
        padding: 20px 32px 4px;
    }

    .add, .sub, .total {
        flex: 1;
        font-family: 'IBM Plex Sans', sans-serif;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.01em;
        color: var(--paper);
        border: none;
        border-radius: 8px;
        padding: 13px 10px;
        cursor: pointer;
        transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.18) inset, 0 6px 14px -6px rgba(0, 0, 0, 0.4);
    }

    .add { background-color: var(--forest); }
    .sub { background-color: var(--clay); }
    .total { background-color: var(--ink); }

    .add:hover { background-color: var(--forest-dark); }
    .sub:hover { background-color: var(--clay-dark); }
    .total:hover { background-color: var(--ink-soft); }

    .add:active, .sub:active, .total:active {
        transform: translateY(1px);
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.12) inset, 0 2px 6px -2px rgba(0, 0, 0, 0.4);
    }

    .add:focus-visible,
    .sub:focus-visible,
    .total:focus-visible,
    #balance:focus-visible {
        outline: 2px solid var(--focus);
        outline-offset: 2px;
    }

    .footnote {
        padding: 18px 32px 0;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 10.5px;
        letter-spacing: 0.04em;
        color: var(--slate);
        opacity: 0.55;
        text-align: center;
    }

    @media (prefers-reduced-motion: reduce) {
        * {
            transition: none !important;
        }
    }

    /* ✅ RESPONSIVE PART */
    @media (max-width: 500px) {
        .page {
            padding: 36px 14px;
        }

        .main {
            width: 100%;
        }

        .letterhead {
            padding: 22px 22px 18px;
        }

        .letterhead h1 {
            font-size: 19px;
        }

        .ledger-row {
            padding: 22px 22px 20px;
        }

        #show {
            font-size: 36px;
        }

        #show::before {
            font-size: 18px;
        }

        .field {
            padding: 4px 22px 6px;
        }

        .actions {
            flex-direction: column;
            padding: 18px 22px 4px;
        }

        .add, .sub, .total {
            width: 100%;
            padding: 14px 10px;
        }

        .footnote {
            padding: 16px 22px 0;
        }
    }
</style>
</head>

<body>

<div class="page">
    <div class="main">
        <div class="letterhead">
            <div>
                <span class="eyebrow">Statement Card</span>
                <h1>Bank Balance</h1>
            </div>
            <div class="mark" aria-hidden="true"></div>
        </div>

        <div class="ledger-row">
            <span class="eyebrow">Current balance</span>
            <h1 id="show">-</h1>
        </div>

        <div class="field">
            <label for="balance">Enter amount</label>
            <input type="number" id="balance" placeholder="e.g. 1000">
        </div>

        <div class="actions">
            <button class="add" onclick="add()">Add</button>
            <button class="sub" onclick="sub()">Subtract</button>
            <button class="total" onclick="total()">Total</button>
        </div>

        <p class="footnote">Minimum transaction amount: Rs 500</p>
    </div>
</div>

<script>
    let Total = 0;
let balanceinp = document.getElementById("balance");
let show = document.getElementById("show");
//working on add
function add() {
    if(balanceinp.value < 500) {
        alert("add minimum 500")
        return;
    }
    Total += Number(balanceinp.value);
    alert("your amount is successfully added")
    balanceinp.value = "";
    }
//working on subtract
function sub() {
    if(balanceinp.value < 500) {
        alert("subtract minimum 500")
        return;
    }
    else if(balanceinp.value > Total) {
        alert("This amount of money does not exist in your account")
        return;
    }
    Total -= balanceinp.value;
    alert("your amount is successfully subtracted")
    balanceinp.value = "";
}
//working on total
function total() {
    show.innerText = Total;
}
</script>

</body>
</html>
