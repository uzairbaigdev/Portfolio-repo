<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication</title>

    <style>
        body{
            background:#0d0d0d;
            color:white;
            font-family:Arial, sans-serif;
        }

        .name{
            text-align:center;
            margin-top:80px;
            font-size:35px;
            font-weight:bold;
        }

        .subtitle{
            text-align:center;
            color:gray;
            margin-top:5px;
        }

        .main{
            display:flex;
            justify-content:center;
            margin-top:40px;
        }

        .box{
            width:400px;
            background:#1a1a1a;
            border:1px solid #333;
            border-radius:15px;
            padding:20px;
        }

        .box p{
            margin-bottom:5px;
        }

        #email-inp,
        #password-inp{
            width:375px;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#2b2b2b;
            color:white;
            /* box-sizing:border-box; */
        }

        .box-password{
            margin-top:15px;
        }

        .box-button{
            margin-top:20px;
        }

        #sign-up-btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#555;
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
        }

        .box-button-error{
            color:red;
            display:none;
            padding-bottom: 10px;
        }
        #box-button-success {
            color:green;
            display:none;
            padding-bottom: 10px;
        }
        #box-btn-load {
            color: white;
            display: none;
        }
        /* --- ADDED MEDIA QUERY FOR RESPONSIVENESS --- */
        @media (max-width: 450px) {
            .main {
                padding: 0 20px; /* Adds space on the left and right of the screen */
            }
            .box {
                width: 100%; /* Allows the box to shrink to the screen width */
            }
            #email-inp,
            #password-inp {
                width: 100%; /* Allows inputs to scale correctly inside the box */
                box-sizing: border-box; /* Ensures padding doesn't stretch the inputs wider than the box */
            }
        }

    </style>
</head>
<body>

    <div class="name">SIGN UP</div>
    <div class="subtitle">Create your account</div>

    <div class="main">
        <div class="box">

            <div class="box-email">
                <p>Email Address</p>
                <input type="email" id="email-inp" placeholder="Enter your email" autocomplete="one-time-code">
            </div>

            <div class="box-password">
                <p>Password</p>
                <input type="password" id="password-inp" placeholder="Enter your password" autocomplete="new-password">
            </div>

            <div class="box-button" id="box-button">
                <p id="box-btn-load">Loading...</p>
                <p class="box-button-error" id="box-button-error">Something went wrong</p>
                <p id="box-button-success">Your account is successfully created</p>
                <button id="sign-up-btn">SIGN UP</button>
            </div>

        </div>
    </div>

    <script type="module" src="./app.js"></script>

</body>
</html>
