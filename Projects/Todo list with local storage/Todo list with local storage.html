<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo list with local storage</title>
    <style>
        :root {
            --bg: #eef1f7;
            --surface: #ffffff;
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --primary-light: #eef0ff;
            --text: #1f2330;
            --muted: #6b7280;
            --border: #e3e6ee;
            --danger: #ef4444;
            --danger-dark: #dc2626;
            --warning: #b45309;
            --warning-dark: #92400e;
            --success: #16a34a;
            --success-bg: #ecfdf3;
            --success-border: #bbf7d0;
            --shadow: 0 10px 30px rgba(31, 35, 48, 0.08);
            --shadow-sm: 0 2px 8px rgba(31, 35, 48, 0.06);
            --radius: 14px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text);
            min-height: 100vh;
        }

        nav {
           width: 100%;
           height: 110px;
           background: linear-gradient(135deg, #14163b, #2a1f63);
           color: white;
           display: flex;
           justify-content: center;
           align-items: center;
           font-size: 34px;
           font-weight: 600;
           letter-spacing: 1px;
           box-shadow: 0 4px 18px rgba(0, 0, 0, 0.15);
        }

        nav::before {
            content: "📝";
            margin-right: 14px;
            font-size: 38px;
        }

        #main {
            width: 100%;
            max-width: 560px;
            height: fit-content;
            background-color: var(--surface);
            margin: 40px auto;
            border-radius: 20px;
            padding: 40px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        #child1 {
            width: 100%;
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

         #todoinp {
            height: 48px;
            width: 100%;
            flex: 1;
            font-size: 16px;
            padding: 0 16px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            outline: none;
            background-color: #fafbfe;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
         }

         #todoinp::placeholder {
            color: #9ca3af;
         }

         #todoinp:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
            background-color: var(--surface);
         }

         #addbtn {
            height: 48px;
            width: fit-content;
            padding: 0 22px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background-color: var(--primary);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.15s ease, transform 0.05s ease;
            white-space: nowrap;
         }

         #addbtn:hover {
            background-color: var(--primary-dark);
         }

         #addbtn:active {
            transform: scale(0.97);
         }

         #child2 {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 12px;
         }

         #child2:empty::after {
            content: "Nothing to do yet — add your first task above ✨";
            display: block;
            text-align: center;
            color: var(--muted);
            font-size: 14.5px;
            padding: 30px 10px;
            border: 1.5px dashed var(--border);
            border-radius: 12px;
         }

         .box {
            width: 100%;
            height: fit-content;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 18px;
            background-color: #fdfdff;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            font-size: 15.5px;
            line-height: 1.4;
            transition: background-color 0.2s ease, border-color 0.2s ease;
         }

         .box button {
            margin-left: 0 !important;
         }

         .box > button:first-of-type {
            margin-left: auto !important;
         }

         .deletebtn,
         .changebtn,
         .donebtn,
         .notdonebtn,
         #updatebtn {
            height: 36px;
            width: fit-content;
            font-size: 13.5px;
            font-weight: 600;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0 14px;
            cursor: pointer;
            transition: opacity 0.15s ease, transform 0.05s ease;
         }

         .deletebtn:hover,
         .changebtn:hover,
         .donebtn:hover,
         .notdonebtn:hover,
         #updatebtn:hover {
            opacity: 0.88;
         }

         .deletebtn:active,
         .changebtn:active,
         .donebtn:active,
         .notdonebtn:active,
         #updatebtn:active {
            transform: scale(0.96);
         }

         .deletebtn {
            background-color: var(--danger);
         }

         .deletebtn:hover {
            background-color: var(--danger-dark);
         }

         .changebtn {
            background-color: var(--warning);
         }

         .changebtn:hover {
            background-color: var(--warning-dark);
         }

         #updatebtn {
            background-color: var(--primary);
            display: none;
         }

         #updatebtn:hover {
            background-color: var(--primary-dark);
         }

         .donebtn {
            background-color: #6b7280;
         }

         .donebtn:hover {
            background-color: #52525b;
         }

         .notdonebtn {
            background-color: #6b7280;
         }

         .notdonebtn:hover {
            background-color: #52525b;
         }

         /* completed task look — JS sets backgroundColor inline to lightgreen/white,
            this just keeps the card styling consistent around it */
         .box[style*="lightgreen"] {
            border-color: var(--success-border) !important;
         }

         /* ===== Responsive Design ===== */

/* Tablets */
@media (max-width: 1024px) {
    nav {
        font-size: 28px;
        height: 95px;
    }

    #main {
        margin: 30px auto;
        width: 88%;
        padding: 32px;
    }
}

/* Mobile */
@media (max-width: 600px) {
    nav {
        font-size: 22px;
        height: 85px;
        text-align: center;
    }

    nav::before {
        font-size: 28px;
        margin-right: 10px;
    }

    #main {
        width: 92%;
        margin: 20px auto;
        padding: 22px;
    }

    #child1 {
        flex-direction: column;
        gap: 10px;
    }

    #todoinp {
        width: 100%;
    }

    #addbtn,
    #updatebtn {
        width: 100%;
        padding: 0;
    }

    .box {
        width: 100%;
        text-align: center;
        justify-content: center;
    }

    .box > button:first-of-type {
        margin-left: 0 !important;
    }

    .deletebtn,
    .changebtn,
    .donebtn,
    .notdonebtn {
        flex: 1 1 calc(50% - 8px);
    }
}
    </style>
</head>
<body>
    <nav>Todo List</nav>
    <div id="main">
        <div id="child1">
            <input type="text" name="Todos" id="todoinp" placeholder="What do you need to do?">
            <button id="addbtn" onclick="add()">Add</button>  
            <button id="updatebtn" onclick="update()">Update</button>           
        </div>
        <div id="child2"></div>
    </div>
    <script>
let Todos = [];
let todoinp = document.getElementById("todoinp");
let child2 = document.getElementById("child2");
let addbtn = document.getElementById("addbtn");
let updatebtn = document.getElementById("updatebtn");

//working on local storage
function getData() {
let getlocalstoragedata = window.localStorage.getItem("Todos");
if(getlocalstoragedata !== null) {
    let parsedata = JSON.parse(getlocalstoragedata);
    // console.log(parsedata);
Todos = parsedata;
//working on DOM
for(let i=0; i < Todos.length; i++) {    
let divelm = document.createElement("div");
divelm.className = "box";
child2.appendChild(divelm);
divelm.innerText = Todos[i].text;
//working on deleting button
let deletebtn = document.createElement("button");
deletebtn.innerText = "Delete";
deletebtn.className = "deletebtn";
divelm.appendChild(deletebtn);
deletebtn.onclick = function () {
    divelm.remove();
    Todos.splice(i,1);
    localStorage.setItem("Todos",JSON.stringify(Todos));
}
//working on change button
let changebtn = document.createElement("button");
changebtn.innerText = "Change";
changebtn.className = "changebtn";
divelm.appendChild(changebtn);
changebtn.onclick = function () {
    todoinp.value = Todos[i].text;
    addbtn.style.display = "none";
    changebtn.style.display = "none";
    deletebtn.style.display = "none";
    updatebtn.style.display = "inline";
//working on update button
updatebtn.onclick = function () {
    if(todoinp.value === "") {
        alert("enter todo");
        return;
    }
    Todos[i].text = todoinp.value;
    divelm.innerText = todoinp.value;
divelm.appendChild(deletebtn);
divelm.appendChild(changebtn);
divelm.appendChild(donebtn);
updatebtn.style.display = "none";
addbtn.style.display = "inline";
deletebtn.style.display = "inline";
changebtn.style.display = "inline";
localStorage.setItem("Todos",JSON.stringify(Todos));
todoinp.value = "";    
}     }    
//working on done button
let donebtn = document.createElement("button");
donebtn.innerText = "Done";
donebtn.className = "donebtn";
divelm.appendChild(donebtn);
donebtn.onclick = function () {
    Todos[i].iscomplete = true;
    divelm.style.backgroundColor = "lightgreen";
    notdonebtn.style.display = "inline"
    donebtn.style.display = "none";
    localStorage.setItem("Todos",JSON.stringify(Todos));    
    }
//working on not done button
let notdonebtn = document.createElement("button");
notdonebtn.innerText = "NotDone";
divelm.appendChild(notdonebtn);
notdonebtn.className = "notdonebtn"
notdonebtn.style.display = "none"
notdonebtn.onclick = function () {
     Todos[i].iscomplete = false;
     divelm.style.backgroundColor = "white";
     donebtn.style.display = "inline";
     notdonebtn.style.display = "none";
localStorage.setItem("Todos",JSON.stringify(Todos));    
}
if(Todos[i].iscomplete === true) {
    divelm.style.backgroundColor = "lightgreen";
    donebtn.style.display = "none";
    notdonebtn.style.display = "inline";
}

}   }
}
getData();

//working on adding and temporary function
function add() {
    if(todoinp.value === "") {
        alert("enter todo");
        return;
    }
//pushing data in the form of objects
let todoobj = {
    text:todoinp.value,
    iscomplete:false,
    ID:Math.floor(Math.random()*999999999999)
}    
Todos.push(todoobj);
// console.log(Todos);
//sending data to local storage
let stringLocalstorage = JSON.stringify(Todos);
window.localStorage.setItem("Todos",stringLocalstorage);
//working on DOM
let divelm = document.createElement("div");
divelm.innerText = todoinp.value;
divelm.className = "box";
child2.appendChild(divelm);
//working on deleting button
let deletebtn = document.createElement("button");
deletebtn.innerText = "Delete"
deletebtn.className = "deletebtn";
divelm.appendChild(deletebtn);
deletebtn.onclick = function () {
    divelm.remove();
    for(let i=0; i < Todos.length; i++) {
        Todos.splice(i,1);
    }
localStorage.setItem("Todos",JSON.stringify(Todos));
}
//working on change button
let changebtn = document.createElement("button");
changebtn.innerText = "Change";
changebtn.className = "changebtn";
divelm.appendChild(changebtn);
changebtn.onclick = function () {
    addbtn.style.display = "none";
    changebtn.style.display = "none";
    deletebtn.style.display = "none";
    updatebtn.style.display = "inline";
todoinp.value = todoobj.text;
//working on update button
updatebtn.onclick = function () {
    if(todoinp.value === "") {
        alert("enter todo");
        return;
    }
    addbtn.style.display = "inline";
    changebtn.style.display = "inline";
    deletebtn.style.display = "inline";
    updatebtn.style.display = "none";
    divelm.innerText = todoinp.value;
    divelm.appendChild(deletebtn);
    divelm.appendChild(changebtn);
    divelm.appendChild(donebtn);y
todoobj.text = todoinp.value;   
localStorage.setItem("Todos",JSON.stringify(Todos));
    todoinp.value = "";
}     }
//working on done button
let donebtn = document.createElement("button");
donebtn.innerText = "Done";
donebtn.className = "donebtn";
divelm.appendChild(donebtn);
donebtn.onclick = function () {
    divelm.style.backgroundColor = "lightgreen";
    todoobj.iscomplete = true;
    donebtn.style.display = "none";
localStorage.setItem("Todos",JSON.stringify(Todos));    
//working on not done button
let notdonebtn = document.createElement("button");
notdonebtn.innerText = "NotDone";
notdonebtn.className = "notdonebtn";
divelm.appendChild(notdonebtn);
notdonebtn.onclick = function () {
    divelm.style.backgroundColor = "white";
    donebtn.style.display = "inline";
    notdonebtn.style.display = "none";
    todoobj.iscomplete = false;
localStorage.setItem("Todos",JSON.stringify(Todos));    
}    }
todoinp.value = "";
}
    </script>
</body>
</html>
