<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JARVIS IT Course Form</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    min-height:100vh;
}

/* NAVBAR */

nav{
    width:100%;
    height:120px;
    background:#020224;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:32px;
    letter-spacing:4px;
    font-weight:bold;
}

/* MAIN CONTAINER */

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
}

.main1{
    width:100%;
    max-width:500px;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* INPUTS */

.main1 input{
    width:100%;
    padding:12px;
    margin-top:20px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
}

.main1 input:focus{
    outline:none;
    border-color:#020224;
}

/* BUTTON */

.submit{
    width:100%;
    padding:12px;
    margin-top:25px;
    border:none;
    background:#020224;
    color:white;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

.submit:hover{
    background:#0d0d6b;
}

/* WARNING */

h1{
    margin-top:30px;
    color:red;
    font-size:22px;
}

.warning{
    margin-top:5px;
}

/* COURSES */

.coursesavailable{
    color:black;
    margin-top:20px;
}

.courses{
    margin-top:10px;
    line-height:1.8;
    font-weight:500;
}

/* MOBILE */

@media (max-width:500px){

nav{
    font-size:24px;
    text-align:center;
    padding:10px;
}

.main1{
    padding:25px;
}

}

</style>
</head>

<body>

<nav>JARVIS IT Courses</nav>

<div class="container">

<div class="main1">

<input type="text" id="name" placeholder="Enter your name">

<input type="number" id="age" placeholder="Enter your age">

<input type="text" id="course" placeholder="Enter your course">

<button class="submit" onclick="submit()">Submit</button>

<h1>Warning</h1>
<p class="warning">Copy paste course name from the bottom</p>

<h1 class="coursesavailable">Courses Available</h1>

<div class="courses">
Web and App Development <br>
Python Programming <br>
Graphic Designing
</div>

</div>

</div>

<script>
    let stdData =[]
let nameinp = document.getElementById("name")
let ageinp = document.getElementById("age")
let courseinp = document.getElementById("course")
//working on submit button
function submit() {
if(nameinp.value === "" || ageinp.value === "" || courseinp.value === "") {
alert("full fill all inputs correctly")
return;
    } 
//course available
else if(courseinp.value.toLowerCase() === "web and app development" ||courseinp.value.toLowerCase() === "python programming" ||courseinp.value.toLowerCase() === "graphic designing") {
alert("your foam is successfully submited")
//pushing data to array in the form of objects
let userobj = {
name:nameinp.value,
age:ageinp.value,
course:courseinp.value,
id:Math.floor(Math.random()*999999999999)
        }        
stdData.push(userobj)
console.log(stdData)
//pushing data to local storage
let stringdata = JSON.stringify(userobj)
window.localStorage.setItem("userdata",stringdata)        
nameinp.value = ""
ageinp.value = ""
courseinp.value = ""
    }    
    else {
        alert("This course is not available yet")
    }
}
</script>

</body>
</html>
