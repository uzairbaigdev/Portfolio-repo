     body {
    background-color: #f4f6f9;
    margin: 0;
    padding: 0;
    font-family: Arial, Helvetica, sans-serif;
}

/* MAIN GRID */
#main {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 20px;
    gap: 15px;
}

/* USER CARD */
.box {
    width: 280px;
    height: 180px;
    background: linear-gradient(135deg, #ffffff, #f1f1f1);
    border-radius: 15px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 20px;
    text-align: center;
    cursor: pointer;
    font-weight: 600;
    color: #333;

    /* shadow */
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);

    /* animation */
    transition: all 0.3s ease;
}

/* hover effect */
.box:hover {
    transform: translateY(-5px) scale(1.02);
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

/* MODAL */
#main2 {
    position: fixed;   
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 420px;
    max-width: 90%;
    max-height: 80vh;
    overflow-y: auto;

    background: #ffffff;
    z-index: 1000;     
    display: none;
    border-radius: 15px; 
    padding: 20px;

    box-shadow: 0 10px 30px rgba(0,0,0,0.3);

    animation: fadeIn 0.3s ease;
}

/* modal animation */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translate(-50%, -60%);
    }
    to {
        opacity: 1;
        transform: translate(-50%, -50%);
    }
}

/* CLOSE BUTTON */
#closebtn {
    color: white;
    background: linear-gradient(45deg, #ff4d4d, #cc0000);
    border: none;
    padding: 6px 12px;
    border-radius: 6px;
    float: right;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

#closebtn:hover {
    background: linear-gradient(45deg, #ff0000, #990000);
}

/* DATA ROWS */
#main2 div {
    background: #f7f7f7;
    margin: 8px 0;
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 14px;
    color: #333;

    display: flex;
    justify-content: space-between;

    border-left: 4px solid #4CAF50;
}

/* ========================= */
/* 📱 MOBILE */
/* ========================= */
@media (max-width: 600px) {

    .box {
        width: 100%;
        height: 120px;
        font-size: 18px;
    }

    #main {
        flex-direction: column;
        align-items: center;
    }

    #main2 {
        width: 95%;
        padding: 15px;
    }

    #closebtn {
        float: none;
        display: block;
        margin-left: auto;
        margin-bottom: 10px;
    }
}

/* ========================= */
/* 📲 TABLET */
/* ========================= */
@media (min-width: 601px) and (max-width: 900px) {

        width: 45%;
        height: 150px;
    }

}
