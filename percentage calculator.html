<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Percentage Calculator</title>
    <style>
        /* Reset and base styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e1e2f, #2c2c3d);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #2a2a3d;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
            font-size: 2rem;
            color: #ffcc00;
            transition: 0.3s;
        }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus {
            box-shadow: 0 0 10px #ffcc00;
            background-color: #3a3a55;
        }

        button {
            padding: 15px 30px;
            width: 100%;
            border: none;
            border-radius: 10px;
            background: #ffcc00;
            color: #2a2a3d;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #e6b800;
        }

        #output {
            margin-top: 25px;
            font-size: 1.5rem;
            color: #00ffcc;
            word-wrap: break-word;
        }

        /* Responsive design */
        @media (max-width: 500px) {
            .container {
                padding: 30px 20px;
            }

            input, button {
                padding: 12px;
                font-size: 0.9rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            #output {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Percentage Calculator</h1>
        <input type="number" id="inp1" placeholder="Enter your obtained marks">
        <input type="number" id="inp2" placeholder="Enter your total marks">
        <button onclick="per()">Calculate Percentage</button>
        <h1 id="output">Your result will appear here</h1>
    </div>
<script>
    function per() {
    var inp1 = Number(document.getElementById("inp1").value);
    var inp2 = Number(document.getElementById("inp2").value);
var output = document.getElementById("output");
if(inp1 > inp2) {
    alert("enter correct input")
    return ;
}
if(inp1 <= 0 || inp2 <= 0) {
    alert("please enter correct input")
    return ;
}
var result = ((inp1/inp2)*100).toFixed(2)
output.innerText = result+"%"
if(result >= 80) {
    output.style.backgroundColor = "green"
    output.style.color = "white"
}
 else if(result >= 41) {
    output.style.backgroundColor = "yellow"
    output.style.color = "white"
 }
 else {
    output.style.backgroundColor = "red"
    output.style.color = "white"
 }
}
</script>
</body>
</html>
