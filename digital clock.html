<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
body{
    background-color: rgb(4, 6, 25);
    background-image: radial-gradient(circle at top right, rgb(60, 0, 120), rgb(4, 6, 25));
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.heading-div{
    margin-top: 20px;
    display: flex;
    justify-content: center;
}

.h1{
    color: rgb(200, 150, 255);
    font-size: 40px;
    text-shadow: 0px 0px 15px rgb(160, 0, 255);
    letter-spacing: 3px;
}

.parent{
    margin-top: 50px;
    display: flex;
    justify-content: center;
    width: 100%;
}

.child1{
    width: 80%;
    max-width: 700px;
    height: auto;
    min-height: 220px;
    background-color: rgba(20, 20, 60, 0.45);
    border-width: 2px;
    border-style: solid;
    border-color: rgba(180, 120, 255, 0.8);
    border-top-left-radius: 30px;
    border-top-right-radius: 30px;
    border-bottom-left-radius: 30px;
    border-bottom-right-radius: 30px;
    box-shadow: 0px 0px 35px rgba(160, 0, 255, 0.6);
    backdrop-filter: blur(14px);
    animation-name: glowPulse;
    animation-duration: 3s;
    animation-iteration-count: infinite;
}

@keyframes glowPulse{
    0%{
        box-shadow: 0px 0px 20px rgba(160, 0, 255, 0.4);
    }
    50%{
        box-shadow: 0px 0px 45px rgba(200, 0, 255, 0.9);
    }
    100%{
        box-shadow: 0px 0px 20px rgba(160, 0, 255, 0.4);
    }
}

.child2{
    width: 100%;
    height: auto;
    min-height: 110px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 26px;
    font-weight: bold;
    color: rgb(200, 170, 255);
    text-shadow: 0px 0px 10px rgba(180, 120, 255, 0.9);
    letter-spacing: 2px;
    flex-wrap: wrap;
}

.child3{
    width: 100%;
    height: auto;
    min-height: 110px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 44px;
    font-weight: bold;
    color: rgb(255, 255, 255);
    text-shadow: 0px 0px 14px rgb(180, 0, 255);
    letter-spacing: 5px;
    flex-wrap: wrap;
}

.child4{
    font-size: 16px;
    color: rgb(180, 120, 255);
    margin-left: 6px;
}

.name{
    color: rgb(120, 120, 180);
    margin-right: 6px;
    margin-left: 6px;
}

@media screen and (max-width: 768px){
    .h1{
        font-size: 32px;
    }
    .child3{
        font-size: 36px;
    }
}

@media screen and (max-width: 480px){
    .h1{
        font-size: 26px;
    }
    .child2{
        font-size: 18px;
    }
    .child3{
        font-size: 28px;
    }
}

@media screen and (max-width: 360px){
    .child2{
        font-size: 16px;
    }
    .child3{
        font-size: 24px;
    }
}



</style>
</head>
<body>
   <div class="heading-div">
     <h1 class="h1">🕒Current Time</h1>
   </div>
    <div class="parent">
        <div class="child1">
   <div class="child2">
    <span class="name">DATE:</span>
<span class="month" id="month"></span>
<span>:</span>
<span class="name">DAY:</span>
<span class="day" id="day"></span>
<span>:</span>
<span class="name">YEAR:</span>
<span class="year" id="year"></span>
   </div>
   <div class="child3">
    <span class="hours" id="hours"></span>
    <span>:</span>
    <span class="minutes" id="minutes"></span>
    <span>:</span>
    <span class="seconds" id="seconds"></span>
<div class="child4">
        <span>:</span>
    <span class="milli" id="milli"></span>
</div>
   </div>
        </div>
    </div>
   
  <script>
       function month() {
    var date = new Date()
    var monthnum = date.getMonth()
   var monthname = ["January", "February", "March", "April", "May", "June","July", "August", "September", "October", "November", "December"]
var completemonth = monthname[monthnum] 
var date = new Date()
var completedate = date.getDate()
var complete = completedate+" "+completemonth        
var monthplace = document.getElementById("month");
monthplace.innerText = complete

}
month();
function day() {
    var date = new Date()
    var daysnum = date.getDay()
    var daysname = ["sunday","monday","tuesday","wednesday","thursday","friday","saturday"]
    var completeday = daysname[daysnum]
    var dayplace = document.getElementById("day");
    dayplace.innerText = completeday
}
day()
function year() {
    var date = new Date()
    var year = date.getFullYear()
    var yearplace = document.getElementById("year")
    yearplace.innerText = year
}
year()
function hours() {
    var date = new Date()
    var hoursnum = date .getHours();
var hoursplace = document.getElementById("hours");
hoursplace.innerText = hoursnum
if(hoursnum == 0) {
    hoursplace.innerText = 12+"AM"
}
else if(hoursnum == 12) {
    hoursplace.innerText = 12+"PM"
}
else if (hoursnum >= 1 && hoursnum <= 11) {
    hoursplace.innerText = hoursnum;
}
else {
    var sub = hoursnum-12;
    hoursplace.innerText = sub+"PM"
}
if(hoursnum < 10) {
    hoursplace.innerText = "0"+hoursnum
}
}
hours()
setInterval(minutes,1000*60*60)
function minutes() {
    var date = new Date()
    var min = date.getMinutes()
    var minplace = document.getElementById("minutes")
    if(min < 10) {
        minplace.innerText = "0"+min;
    }
   else {
     minplace.innerText = min
   }
    }
minutes()
setInterval(minutes,1000)
function seconds() {
    var date = new Date()
    var sec = date.getSeconds()
    var secplace = document.getElementById("seconds")
    if(sec < 10) {
        secplace.innerText = "0"+sec
    }
    else {
        secplace.innerText = sec
    }
}
seconds()
setInterval(seconds,1000)
function millisecond() {
    var date = new Date()
    var milli = date.getMilliseconds()
    var milliplace = document.getElementById("milli");
    milliplace.innerText = milli
}
millisecond()
setInterval(millisecond,1)
    </script>
</body>
</html>
