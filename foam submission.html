<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
   * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Inter", "Segoe UI", sans-serif;
}

body {
    background-color: #f4f6f9;
}

/* NAVBAR */
.nav {
    height: 70px;
    background-color: #0f172a;
    color: white;
    display: flex;
    align-items: center;
    padding-left: 40px;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 1px;
}

/* MAIN CONTAINER */
.parent {
    max-width: 800px;
    margin: 60px auto;
    background: white;
    padding: 40px;
    border-radius: 8px;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
}

/* FORM ROW */
.child1 {
    display: flex;
    gap: 25px;
    margin-bottom: 25px;
    margin-top: 10px;
}

/* INPUT FIELDS */
input {
    flex: 1;
    padding: 12px 14px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-size: 14px;
    transition: 0.2s ease;
    background-color: #fafafa;
}

input:focus {
    border-color: #2563eb;
    background-color: #ffffff;
    outline: none;
}

/* BUTTON */
button {
    padding: 12px 30px;
    border: none;
    border-radius: 6px;
    background-color: #2563eb;
    color: white;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: 0.2s ease;
}

button:hover {
    background-color: #1e40af;
}
.error {
    color: red;
    display: none;
}
.warning {
    color: red;
}
/* RESPONSIVE DESIGN */

@media screen and (max-width: 768px) {

  .parent {
    margin: 30px 20px;
    padding: 25px;
  }

  .child1 {
    flex-direction: column;
    gap: 15px;
  }

  input {
    width: 100%;
  }

  button {
    width: 100%;
  }

  .nav {
    justify-content: center;
    padding-left: 0;
    font-size: 18px;
    text-align: center;
  }

  h1 {
    font-size: 22px;
  }

  ul {
    padding-left: 18px;
  }
}

    </style>
</head>
<body>
   <nav class="nav">JARVIS IT COURSES</nav>
   <div class="parent">
<div class="child1">
    <input type="text" name="name" id="name" placeholder="enter your name">
    <input type="number" name="age" id="age" placeholder="enter your age">
</div>
<div class="child1">
    <input type="text" name="city" id="city" placeholder="enter your city">
    <input type="text" name="course" id="course" placeholder="enter your course name">
</div>
<h1 class="warning">WARNING</h1>
<p>your course spelling and pattern should be like written in below</p>
<div class="child1">
    <button onclick="submit()">submit</button>
    <p class="error" id="error">enter correct input</p>
</div>
<h1>Courses available yet</h1>
<ul>
    <li>web and app development</li>
    <li>Python programming</li>
    <li>Graphic designing</li>
</ul>
   </div>
    <script>
        let stddata = []
function submit() {
    let nameinp = document.getElementById("name").value;
    let ageinp = document.getElementById("age").value;
    let cityinp = document.getElementById("city").value;
   let courseinp = document.getElementById("course").value.toLowerCase().trim();
    let data = {
        name:nameinp,
        age:ageinp,
        city:cityinp,
        course:courseinp
    }
    if(nameinp.trim() === "" || ageinp.trim() === "" || cityinp.trim() === "" || courseinp.trim() === "") {
   let error = document.getElementById("error")
   error.style.display = "inline"
        return ; 
    }
    else if(courseinp === "web and app development" || courseinp === "python programming" || courseinp === "graphic designing") {
        stddata.push(data)
        alert("your foam is succesfully submited")
   error.style.display = "none"
document.getElementById("name").value = "";
document.getElementById("age").value = "";
document.getElementById("city").value = "";
document.getElementById("course").value = "";
}
    else {
        alert("this course is not available yet")
        document.getElementById("name").value = "";
document.getElementById("age").value = "";
document.getElementById("city").value = "";
document.getElementById("course").value = "";
        return ;
    }
    console.log(stddata)
}
    </script>
</body>
</html>
